server {
    listen 80;
    server_name stock.mulsaem.net;

    root /data/www/stock.mulsaem.net/data/v1;
    index index.html;
    charset utf-8;

    # 메인 메뉴
    location = /data/v1/ {
        alias /data/www/stock.mulsaem.net/data/v1/;
        try_files index.html =404;
    }

    # S&P 500 대시보드 (정적)
    location /data/v1/sp500/ {
        alias /data/www/stock.mulsaem.net/data/v1/sp500/;
        try_files $uri /data/v1/sp500/index.html;
    }

    # S&P 500 PHP API
    location ~ ^/data/v1/sp500/api(/.*)?$ {
        fastcgi_pass   unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param  SCRIPT_FILENAME /data/www/stock.mulsaem.net/data/v1/sp500/api/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        include        fastcgi_params;
    }
}
